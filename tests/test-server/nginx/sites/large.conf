# Port 8452 - Large Responses
# Tests: Memory handling, large payload processing
# Use X-Response-Size header to control response size

server {
    listen 8452 ssl http2;
    server_name localhost;

    # Valid certificates
    ssl_certificate /etc/nginx/ssl/server-certs/valid/fullchain.crt;
    ssl_certificate_key /etc/nginx/ssl/server-certs/valid/server.key;

    # TLS configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Session settings
    ssl_session_timeout 1d;
    ssl_session_cache shared:LARGE:10m;
    ssl_session_tickets off;

    # Buffer settings for large responses
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # Extended timeouts for large transfers
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Default 1MB response
    location / {
        set $size_header $http_x_response_size;
        if ($size_header = '') {
            set $size_header '1048576';  # 1MB
        }

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";

        # Forward the size header
        proxy_set_header X-Response-Size $size_header;

        # Pass TLS info
        proxy_set_header X-TLS-Version $ssl_protocol;
        proxy_set_header X-TLS-Cipher $ssl_cipher;
    }

    # Predefined size endpoints
    location /1kb {
        proxy_pass http://backend/;
        proxy_set_header X-Response-Size 1024;
    }

    location /100kb {
        proxy_pass http://backend/;
        proxy_set_header X-Response-Size 102400;
    }

    location /1mb {
        proxy_pass http://backend/;
        proxy_set_header X-Response-Size 1048576;
    }

    location /10mb {
        proxy_pass http://backend/;
        proxy_set_header X-Response-Size 10485760;
    }

    # Custom size: /size/12345 returns 12345 bytes
    location ~ ^/size/(\d+)$ {
        set $response_size $1;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Response-Size $response_size;
        proxy_set_header X-TLS-Version $ssl_protocol;
    }
}
