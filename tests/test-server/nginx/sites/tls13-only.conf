# Port 8443 - TLS 1.3 Only (Modern)
# Tests: TLS version negotiation, modern cipher suites

server {
    listen 8443 ssl http2;
    server_name localhost;

    # Certificates
    ssl_certificate /etc/nginx/ssl/server-certs/valid/fullchain.crt;
    ssl_certificate_key /etc/nginx/ssl/server-certs/valid/server.key;

    # TLS 1.3 ONLY - strict modern configuration
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;

    # TLS 1.3 ciphersuites (only these are supported in TLS 1.3)
    # Note: ssl_ciphers doesn't affect TLS 1.3 in nginx
    # TLS 1.3 always uses: TLS_AES_256_GCM_SHA384, TLS_CHACHA20_POLY1305_SHA256, TLS_AES_128_GCM_SHA256

    # Session settings
    ssl_session_timeout 1d;
    ssl_session_cache shared:TLS13:10m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling off;
    ssl_stapling_verify off;

    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    location / {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";

        # Pass TLS info to backend
        proxy_set_header X-TLS-Version $ssl_protocol;
        proxy_set_header X-TLS-Cipher $ssl_cipher;
        proxy_set_header X-SSL-Protocol $ssl_protocol;
        proxy_set_header X-SSL-Cipher $ssl_cipher;
    }
}
