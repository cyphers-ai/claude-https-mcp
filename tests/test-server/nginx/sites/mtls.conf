# Port 8445 - mTLS (Mutual TLS) Required
# Tests: Client certificate authentication, Pro mTLS feature

server {
    listen 8445 ssl http2;
    server_name localhost;

    # Server certificates
    ssl_certificate /etc/nginx/ssl/server-certs/valid/fullchain.crt;
    ssl_certificate_key /etc/nginx/ssl/server-certs/valid/server.key;

    # Client certificate verification - REQUIRED
    ssl_client_certificate /etc/nginx/ssl/ca-bundle.crt;
    ssl_verify_client on;
    ssl_verify_depth 2;

    # TLS configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';

    # Session settings
    ssl_session_timeout 1d;
    ssl_session_cache shared:MTLS:10m;
    ssl_session_tickets off;

    location /health {
        # Allow health checks without client cert
        # This won't work with ssl_verify_client on, so return based on path
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    location / {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";

        # Pass TLS info to backend
        proxy_set_header X-TLS-Version $ssl_protocol;
        proxy_set_header X-TLS-Cipher $ssl_cipher;

        # Pass client certificate info to backend
        proxy_set_header X-Client-Cert-Subject $ssl_client_s_dn;
        proxy_set_header X-Client-Cert-Issuer $ssl_client_i_dn;
        proxy_set_header X-Client-Cert-Verify $ssl_client_verify;
        proxy_set_header X-Client-Cert-Serial $ssl_client_serial;
        proxy_set_header X-Client-Cert-Fingerprint $ssl_client_fingerprint;
    }
}
