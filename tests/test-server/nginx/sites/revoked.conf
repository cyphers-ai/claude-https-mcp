# Port 8449 - Revoked Certificate
# Tests: EHTTPS_CERT_REVOKED error, OCSP/CRL checking

server {
    listen 8449 ssl http2;
    server_name localhost;

    # Revoked certificate (in our CRL)
    ssl_certificate /etc/nginx/ssl/server-certs/revoked/fullchain.crt;
    ssl_certificate_key /etc/nginx/ssl/server-certs/revoked/server.key;

    # TLS configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Session settings
    ssl_session_timeout 1d;
    ssl_session_cache shared:REVOKED:10m;
    ssl_session_tickets off;

    # Note: OCSP stapling won't work for revoked certs
    # Clients need to check OCSP/CRL themselves

    location / {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";

        # Pass TLS info
        proxy_set_header X-TLS-Version $ssl_protocol;
        proxy_set_header X-TLS-Cipher $ssl_cipher;
    }
}
