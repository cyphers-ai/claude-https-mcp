# Port 8451 - Slow Responses
# Tests: Timeout handling, EHTTPS_TIMEOUT error
# Use X-Delay-Ms header to control response delay

server {
    listen 8451 ssl http2;
    server_name localhost;

    # Valid certificates
    ssl_certificate /etc/nginx/ssl/server-certs/valid/fullchain.crt;
    ssl_certificate_key /etc/nginx/ssl/server-certs/valid/server.key;

    # TLS configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Session settings
    ssl_session_timeout 1d;
    ssl_session_cache shared:SLOW:10m;
    ssl_session_tickets off;

    # Extended timeouts for slow response testing
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Default 5 second delay
    location / {
        # Add default delay header if not present
        set $delay_header $http_x_delay_ms;
        if ($delay_header = '') {
            set $delay_header '5000';
        }

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";

        # Forward the delay header (use default if not set)
        proxy_set_header X-Delay-Ms $delay_header;

        # Pass TLS info
        proxy_set_header X-TLS-Version $ssl_protocol;
        proxy_set_header X-TLS-Cipher $ssl_cipher;
    }

    # Endpoint that hangs forever (for timeout testing)
    location /hang {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Error-Type timeout;
    }

    # Configurable delay endpoints
    location ~ ^/delay/(\d+)$ {
        set $delay_ms $1;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Delay-Ms $delay_ms;
        proxy_set_header X-TLS-Version $ssl_protocol;
    }
}
