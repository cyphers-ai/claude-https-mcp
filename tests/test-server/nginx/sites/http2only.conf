# Port 8450 - HTTP/2 Only
# Tests: ALPN negotiation, HTTP/2 protocol mode

server {
    listen 8450 ssl;
    http2 on;
    server_name localhost;

    # Valid certificates
    ssl_certificate /etc/nginx/ssl/server-certs/valid/fullchain.crt;
    ssl_certificate_key /etc/nginx/ssl/server-certs/valid/server.key;

    # TLS configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Session settings
    ssl_session_timeout 1d;
    ssl_session_cache shared:HTTP2:10m;
    ssl_session_tickets off;

    # HTTP/2 settings
    http2_max_concurrent_streams 128;
    client_header_timeout 30s;

    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    location / {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";

        # Pass TLS and HTTP/2 info
        proxy_set_header X-TLS-Version $ssl_protocol;
        proxy_set_header X-TLS-Cipher $ssl_cipher;
        proxy_set_header X-HTTP-Version $server_protocol;
    }
}
