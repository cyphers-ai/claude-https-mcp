# Port 8444 - TLS 1.2 Only
# Tests: TLS 1.2 fallback, intermediate cipher suites

server {
    listen 8444 ssl http2;
    server_name localhost;

    # Certificates
    ssl_certificate /etc/nginx/ssl/server-certs/valid/fullchain.crt;
    ssl_certificate_key /etc/nginx/ssl/server-certs/valid/server.key;

    # TLS 1.2 ONLY
    ssl_protocols TLSv1.2;
    ssl_prefer_server_ciphers on;

    # Intermediate cipher suite (Mozilla recommendation)
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';

    # ECDH curve
    ssl_ecdh_curve secp384r1;

    # Session settings
    ssl_session_timeout 1d;
    ssl_session_cache shared:TLS12:10m;
    ssl_session_tickets off;

    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    location / {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";

        # Pass TLS info to backend
        proxy_set_header X-TLS-Version $ssl_protocol;
        proxy_set_header X-TLS-Cipher $ssl_cipher;
    }
}
