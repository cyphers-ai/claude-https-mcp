# Port 8447 - Self-Signed Certificate
# Tests: EHTTPS_CERT_VERIFY error, trust chain validation

server {
    listen 8447 ssl http2;
    server_name localhost;

    # Self-signed certificate (not in our CA chain)
    ssl_certificate /etc/nginx/ssl/server-certs/selfsigned/fullchain.crt;
    ssl_certificate_key /etc/nginx/ssl/server-certs/selfsigned/server.key;

    # TLS configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Session settings
    ssl_session_timeout 1d;
    ssl_session_cache shared:SELFSIGNED:10m;
    ssl_session_tickets off;

    location / {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";

        # Pass TLS info
        proxy_set_header X-TLS-Version $ssl_protocol;
        proxy_set_header X-TLS-Cipher $ssl_cipher;
    }
}
