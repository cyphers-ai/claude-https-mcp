version: '3.8'

# claude-https Test Server Infrastructure
# Provides comprehensive TLS testing endpoints

services:
  # ===========================================
  # Main nginx reverse proxy with multiple TLS configurations
  # ===========================================
  nginx:
    image: nginx:1.25-alpine
    container_name: https-test-nginx
    ports:
      - "9080:8080"   # HTTP (no TLS)
      - "9443:8443"   # TLS 1.3 only (modern)
      - "9444:8444"   # TLS 1.2 only
      - "9445:8445"   # mTLS required
      - "9446:8446"   # Expired certificate
      - "9447:8447"   # Self-signed certificate
      - "9448:8448"   # Wrong hostname
      - "9449:8449"   # Revoked certificate
      - "9450:8450"   # HTTP/2 only
      - "9451:8451"   # Slow responses
      - "9452:8452"   # Large responses
      - "9453:8453"   # OCSP Stapling enabled
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites:/etc/nginx/sites:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./pki:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - testnet
    restart: unless-stopped

  # ===========================================
  # Echo backend server
  # Returns request details for verification
  # ===========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: https-test-backend
    environment:
      - NODE_ENV=test
      - PORT=3001
    networks:
      - testnet
    restart: unless-stopped

  # ===========================================
  # OCSP Responder for revocation testing
  # ===========================================
  ocsp:
    build:
      context: ./ocsp
      dockerfile: Dockerfile
    container_name: https-test-ocsp
    ports:
      - "9888:8888"
    volumes:
      - ./pki:/pki:ro
    networks:
      - testnet
    restart: unless-stopped

  # ===========================================
  # CRL Distribution Point
  # Serves Certificate Revocation Lists
  # ===========================================
  crl:
    image: nginx:1.25-alpine
    container_name: https-test-crl
    ports:
      - "9889:80"
    volumes:
      - ./pki/crl:/usr/share/nginx/html:ro
      - ./nginx/crl.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - testnet
    restart: unless-stopped

  # ===========================================
  # Squid Proxy for proxy testing
  # ===========================================
  proxy:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    container_name: https-test-proxy
    ports:
      - "9128:3128"   # HTTP proxy (no auth)
      - "9129:3129"   # HTTP proxy (basic auth)
    networks:
      - testnet
    restart: unless-stopped

networks:
  testnet:
    driver: bridge
    name: https-test-network
    ipam:
      config:
        - subnet: 172.28.0.0/16
