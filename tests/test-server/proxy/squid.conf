# Squid Proxy Configuration for n8n-https Testing
# Provides both authenticated and unauthenticated proxy endpoints

# Access control lists
acl localnet src 10.0.0.0/8
acl localnet src 172.16.0.0/12
acl localnet src 192.168.0.0/16
acl localnet src fc00::/7
acl localnet src fe80::/10

acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl Safe_ports port 8080-8499
acl CONNECT method CONNECT

# Authentication for port 3129
auth_param basic program /usr/lib/squid/basic_ncsa_auth /etc/squid/passwords
auth_param basic realm n8n-https Test Proxy
auth_param basic credentialsttl 2 hours

acl authenticated proxy_auth REQUIRED

# Port 3128: No authentication required
http_port 3128

# Port 3129: Basic authentication required
http_port 3129

# Access rules for port 3128 (no auth)
http_access allow localnet
http_access allow localhost

# Access rules for port 3129 (requires auth)
# Note: Squid doesn't have per-port ACLs, so we use a workaround
# All requests will require auth on port 3129

# Deny requests to unsafe ports
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Allow authenticated users
http_access allow authenticated

# Deny all other access
http_access deny all

# Logging
access_log /var/log/squid/access.log squid
cache_log /var/log/squid/cache.log

# Cache settings
cache_dir ufs /var/cache/squid 100 16 256
cache_mem 64 MB
maximum_object_size 64 MB
maximum_object_size_in_memory 1 MB

# DNS settings
dns_v4_first on

# Timeouts
connect_timeout 30 seconds
read_timeout 60 seconds
request_timeout 60 seconds

# Disable caching for testing
cache deny all

# HTTPS/SSL bump settings (for CONNECT tunnels)
# We're just doing CONNECT tunneling, not SSL bumping
ssl_bump splice all

# Visible hostname
visible_hostname https-test-proxy

# Shutdown behavior
shutdown_lifetime 3 seconds
